name: Build Smart Shorts Pro APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.1.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.2-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.1.2/bin" >> $GITHUB_PATH

      - name: Verify Gradle Installation
        run: gradle --version

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.1.2 --distribution-type bin
          chmod +x gradlew

      - name: Configure SDK Properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties

      - name: Compile and Assemble Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Shorts-Pro-Ultimate-APK
          path: |
            **/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error
